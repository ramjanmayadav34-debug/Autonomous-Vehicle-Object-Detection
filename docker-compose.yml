version: '3.9'
services:
  backend:
    build: .
    command: python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    networks:
      - app-network
  frontend:
    build: .
    command: streamlit run frontend/app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - API_BASE=http://backend:8000
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
